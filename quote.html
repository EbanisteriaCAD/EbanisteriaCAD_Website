<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitar Cotización | Ebanistería CAD</title>
  <meta name="description" content="Solicita tu cotización de ebanistería en minutos. Cuéntanos tu categoría, medidas, materiales y presupuesto estimado." />
  <meta property="og:title" content="Solicitar Cotización | Ebanistería CAD" />
  <meta property="og:description" content="Completa el formulario y recibe una propuesta para tu proyecto de ebanistería." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://burgosaxel.github.io/EbanisteriaCAD_Website/quote.html" />
  <meta property="og:image" content="https://burgosaxel.github.io/EbanisteriaCAD_Website/assets/logo.jpg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-topbar"></header>

  <main>
    <section class="section">
      <div class="container">
        <h1 class="section-title">Solicitar Cotización</h1>
        <p class="section-subtitle">Completa este formulario y te contactaremos con una propuesta adaptada a tu proyecto.</p>

        <div class="form-shell">
          <!-- Reemplaza XXXXXX con tu endpoint real de Formspree -->
          <form id="quoteForm" action="https://formspree.io/f/XXXXXXXX" method="POST">
            <div class="grid grid-2">
              <div>
                <label for="name">Nombre *</label>
                <input id="name" name="nombre" type="text" required />
              </div>
              <div>
                <label for="phone">Teléfono *</label>
                <input id="phone" name="telefono" type="tel" required />
              </div>
              <div class="form-span-2">
                <label for="addressLine">Direccion *</label>
                <input id="addressLine" name="direccion" type="text" placeholder="Ej. Urb. Los Pinos, 1A3, Calle Roberto Clemente" required />
              </div>
              <div>
                <label for="city">Pueblo *</label>
                <input id="city" name="pueblo" type="text" placeholder="Ej. Caguas" required />
              </div>
              <div>
                <label for="stateRegion">Estado *</label>
                <input id="stateRegion" name="estado" type="text" placeholder="Ej. PR" required />
              </div>
              <div>
                <label for="postalCode">Codigo Postal *</label>
                <input id="postalCode" name="codigo_postal" type="text" inputmode="numeric" placeholder="Ej. 00725" required />
              </div>
              <div>
                <label for="email">Email *</label>
                <input id="email" name="email" type="email" required />
              </div>
              <div>
                <label for="category">Categoría *</label>
                <select id="category" name="categoria" required>
                  <option value="">Selecciona una categoría</option>
                  <option value="Cocinas">Cocinas</option>
                  <option value="Closets">Closets</option>
                  <option value="Centros TV">Centros TV</option>
                  <option value="Baños">Baños</option>
                  <option value="Comercial">Comercial</option>
                  <option value="Remodelación">Remodelación</option>
                </select>
              </div>
              <div>
                <label for="measures">Medidas aproximadas</label>
                <input id="measures" name="medidas" type="text" placeholder="Ej. 12x10 pies" />
              </div>
              <div>
                <label for="material">Material preferido</label>
                <select id="material" name="material">
                  <option value="">Selecciona un material</option>
                  <option value="PVC Laminado">PVC Laminado</option>
                  <option value="PVC Pintado">PVC Pintado</option>
                  <option value="Panel Tratado Pintado">Panel Tratado Pintado</option>
                  <option value="Panel Tratado Laminado">Panel Tratado Laminado</option>
                  <option value="Panel de Madera Pintado">Panel de Madera Pintado</option>
                  <option value="Panel de Madera Laminado">Panel de Madera Laminado</option>
                </select>
              </div>
              <div>
                <label for="budget">Presupuesto estimado</label>
                <input id="budget" name="presupuesto" type="text" placeholder="Ej. $5,000 - $8,000" />
              </div>
            </div>

            <div>
              <label for="projectImages">Fotos del proyecto</label>
              <input id="projectImages" name="projectImages" type="file" accept="image/*" multiple />
              <p id="quoteImagesHelp" class="field-help">Puedes subir hasta 10 fotos para ayudarnos a entender mejor tu proyecto.</p>
              <div id="projectImagesPreview" class="quote-image-preview" hidden></div>
            </div>

            <div>
              <label for="message">Mensaje *</label>
              <textarea id="message" name="mensaje" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Enviar solicitud</button>
            <p id="quoteStatus" class="form-status" role="status" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer"></footer>
  <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-storage-compat.js"></script>
  <script type="module" src="firebase-config.js?v=20260414a"></script>
  <script type="module" src="quote-service.js?v=20260414a"></script>
  <script type="module" src="script.js?v=20260414a"></script>
</body>
</html>
